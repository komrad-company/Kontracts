syntax = "proto3";
package kolektor.v1;
option deprecated = false;

service KolektorConfigService {
    rpc AddParser(AddParserRequest) returns (AddParserResponse);
    rpc RemoveParser(RemoveParserRequest) returns (RemoveParserResponse);
    rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);
    rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
}

message AddParserRequest {
    string source_type = 1;
}

message AddParserResponse {
    string source_type = 1;
    bool enabled = 2;
    int32 version = 3;
}

message RemoveParserRequest {
    string source_type = 1;
}

message RemoveParserResponse {
    string source_type = 1;
    bool enabled = 2;
    int32 version = 3;
}

message GetMetricsRequest {}

message GetMetricsResponse {
    int64 parsers_total    = 1;
    int64 parsers_enabled  = 2;
    int64 fetchers_total   = 3;
    int64 fetchers_enabled = 4;
    optional int64 last_reload_unix_ms = 5;
}

message GetStatusRequest {}

message GetStatusResponse {
    string status   = 1;
    bool   database = 2;
}
