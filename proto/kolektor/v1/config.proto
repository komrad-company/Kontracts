syntax = "proto3";
package kolektor.v1;
option deprecated = false;

service KolektorConfigService {
    rpc GetCatalog(GetCatalogRequest) returns (GetCatalogResponse);
    rpc AddParser(AddParserRequest) returns (ParserApplyResponse);
    rpc RemoveParser(RemoveParserRequest) returns (ParserApplyResponse);
    rpc ListActiveParsers(ListActiveParsersRequest) returns (ListActiveParsersResponse);
    rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
}

message GetCatalogRequest {}

message CatalogParser {
    string source_type = 1;
    string display_name = 2;
    string category = 3;
    optional int32 default_port = 4;
    optional string ocsf_index = 5;
    optional string description = 6;
}

message GetCatalogResponse {
    repeated CatalogParser parsers = 1;
}

message AddParserRequest {
    string source_type = 1;
}

message RemoveParserRequest {
    string source_type = 1;
}

message ParserApplyResponse {
    string source_type = 1;
    bool active = 2;
    int64 config_written_unix_ms = 3;
}

message ListActiveParsersRequest {}

message ListActiveParsersResponse {
    repeated string source_types = 1;
    optional int64 config_written_unix_ms = 2;
}

message GetStatusRequest {}

message GetStatusResponse {
    string status   = 1;
    bool   database = 2;
}
